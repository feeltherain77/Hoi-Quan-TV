name: Hoi Quan Update VIP
on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        run: python get_link.py

      - name: Check file list.m3u
        run: |
          if [ ! -f list.m3u ]; then
            echo "#EXTM3U" > list.m3u
          fi

      - name: Deploy to GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add list.m3u
          git commit -m "Cập nhật link Hội Quán VIP" || exit 0
          git push
